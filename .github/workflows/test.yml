name: Test Suite

permissions:
  contents: read

on:
  push:
    branches: [ master, develop ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [ master, develop ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run gofmt check
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -ldflags "-X main.version=ci-build -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o bin/watchur ./cmd/watchur
          ./bin/watchur --version

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          go build -ldflags "-X main.version=ci-build -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o bin/watchur.exe ./cmd/watchur
          ./bin/watchur.exe --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: watchur-${{ runner.os }}
          path: bin/watchur*
