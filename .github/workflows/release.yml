name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run gofmt check
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    runs-on: ${{ matrix.runner }}
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Set binary name
        id: binary
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            echo "filename=watchur.exe" >> "$GITHUB_OUTPUT"
            echo "release_name=watchur-${{ matrix.goos }}-${{ matrix.goarch }}.exe" >> "$GITHUB_OUTPUT"
          else
            echo "filename=watchur" >> "$GITHUB_OUTPUT"
            echo "release_name=watchur-${{ matrix.goos }}-${{ matrix.goarch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p "dist/${{ matrix.goos }}-${{ matrix.goarch }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev"
          fi

          go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/${{ steps.binary.outputs.filename }}" \
            ./cmd/watchur

      - name: Verify native Linux binary
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          BINARY_PATH="dist/${{ matrix.goos }}-${{ matrix.goarch }}/${{ steps.binary.outputs.filename }}"
          chmod +x "$BINARY_PATH"
          "$BINARY_PATH" --version

      - name: Rename binary for release
        run: |
          mv \
            "dist/${{ matrix.goos }}-${{ matrix.goarch }}/${{ steps.binary.outputs.filename }}" \
            "dist/${{ matrix.goos }}-${{ matrix.goarch }}/${{ steps.binary.outputs.release_name }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: watchur-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.goos }}-${{ matrix.goarch }}/${{ steps.binary.outputs.release_name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: watchur-*
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: ls -la release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
